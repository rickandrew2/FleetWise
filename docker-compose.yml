services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: fleetwise-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fleetwise}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - fleetwise_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fleetwise}"]
      interval: 10s
      timeout: 5s
      retries: 10

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: fleetwise-cloudbeaver
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8978:8978"
    volumes:
      - fleetwise_cloudbeaver_data:/opt/cloudbeaver/workspace

volumes:
  fleetwise_postgres_data:
  fleetwise_cloudbeaver_data: