spring:
  datasource:
    url: jdbc:h2:mem:fleetwise;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

jwt:
  secret: this-is-a-test-jwt-secret-at-least-32-chars
  expiration-ms: 86400000

notifications:
  email:
    enabled: false