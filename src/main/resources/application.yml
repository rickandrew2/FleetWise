spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: fleetwise
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

server:
  port: ${SERVER_PORT:8080}

frontend:
  allowed-origins: ${FRONTEND_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

graphhopper:
  api:
    base-url: ${GRAPHHOPPER_BASE_URL:https://graphhopper.com/api/1/route}
    key: ${GRAPHHOPPER_API_KEY:}
    vehicle: ${GRAPHHOPPER_VEHICLE:car}

fuel-prices:
  source:
    url: ${FUEL_PRICE_SOURCE_URL:https://fuelprice.ph}
  scheduler:
    enabled: ${FUEL_PRICE_SCHEDULER_ENABLED:true}
    cron: ${FUEL_PRICE_SCHEDULER_CRON:0 0 8 * * TUE}
    zone: ${FUEL_PRICE_SCHEDULER_ZONE:Asia/Manila}
  stale-after-days: ${FUEL_PRICE_STALE_AFTER_DAYS:8}

notifications:
  email:
    enabled: ${EMAIL_NOTIFICATIONS_ENABLED:true}
    from: ${EMAIL_FROM:noreply@fleetwise.local}

springdoc:
  swagger-ui:
    path: /swagger-ui.html